<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #06b6d4;
      font-family: 'Consolas', 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .loader {
      text-align: center;
    }
    h1 {
      font-size: 48px;
      letter-spacing: 12px;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
    }
    .status {
      font-size: 12px;
      color: #52525b;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #06b6d4;
      border-radius: 50%;
      margin: 0 3px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <h1>NEXUS</h1>
    <div class="status">
      Loading dashboard
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
  <script>
    // Navigate to the live Nexus dashboard
    window.location.href = 'https://nexus.buildkit.store';
  </script>
</body>
</html>
